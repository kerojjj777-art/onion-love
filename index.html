<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>洋蔥人交誼廳</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <style>
        :root {
            --mucha-gold: #c5a059; --mucha-green: #4a5d4e;
            --mucha-brown: #3e2723; --mucha-paper: #f4ecd8;
        }

        body { 
            margin: 0; padding: 0; font-family: 'Georgia', 'Times New Roman', serif; 
            background-color: #1a1008; 
            color: var(--mucha-brown); overflow: hidden; touch-action: none; 
            width: 100vw; height: 100vh;
        }

        /* 漂浮選單 (查看身分證 / 傢俱管理) */
        .action-menu {
            display: none; position: absolute; background: var(--mucha-paper); border: 2px solid var(--mucha-gold); 
            border-radius: 8px; z-index: 200; padding: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); flex-direction: column;
        }
        .action-menu button { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--mucha-brown); padding: 8px 12px; text-align: center; }
        .action-menu button:hover { background: rgba(197, 160, 89, 0.2); }
        .action-menu button:not(:last-child) { border-bottom: 1px solid rgba(197, 160, 89, 0.3); }

        /* 登入介面 */
        #login-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--mucha-paper); padding: 30px; border: 3px solid var(--mucha-gold); border-radius: 12px; z-index: 300; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        #login-screen input { padding: 10px; border: 1px solid var(--mucha-gold); border-radius: 4px; background: #fffdf5; margin-bottom: 15px; width: 85%; font-size: 16px; }
        #join-btn { background: var(--mucha-gold); color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 95%; }

        /* 各類彈出視窗共用樣式 */
        .modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--mucha-paper); padding: 20px; 
            border: 3px solid var(--mucha-gold); border-radius: 12px; z-index: 250; text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); width: 85%; max-width: 320px; max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { color: var(--mucha-green); margin-top: 0; border-bottom: 1px solid var(--mucha-gold); padding-bottom: 8px; }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 15px; }
        .modal-btns button, .close-modal-btn { padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer; font-family: inherit; font-size: 15px;}
        .btn-primary { background: var(--mucha-gold); color: white; }
        .btn-secondary { background: #ccc; color: #333; }
        
        #memory-feed { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; text-align: left; }
        .memory-card { background: #fff; border: 1px solid var(--mucha-gold); border-radius: 8px; padding: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .memory-card img { width: 100%; border-radius: 4px; margin-bottom: 8px; }
        .memory-card .author { font-size: 12px; color: var(--mucha-gold); font-weight: bold; margin-bottom: 4px; }
        .memory-card .text { font-size: 14px; color: var(--mucha-brown); }
        #memory-upload-area { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 2px dashed var(--mucha-gold); padding-top: 15px; }
        #memory-upload-area input[type="text"] { padding: 10px; border: 1px solid var(--mucha-gold); border-radius: 4px; }

        /* 遊戲與排版區 (滿版設計) */
        #game-layout-container { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        #phaser-app { width: 100%; height: 100%; display: block; }
        
        /* 懸浮傢俱面板 (頂部中央) */
        #furniture-panel { display: none; position: absolute; top: max(10px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); gap: 10px; padding: 8px; background: rgba(244, 236, 216, 0.85); border-radius: 8px; border: 2px solid var(--mucha-gold); z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #furniture-panel button { background: transparent; border: none; color: var(--mucha-brown); font-weight: bold; font-size: 14px; cursor: pointer; }

        /* 懸浮聊天室 (左上角) */
        #chat-section { display: none; position: absolute; top: max(60px, env(safe-area-inset-top)); left: 10px; width: 250px; flex-direction: column; z-index: 100; pointer-events: none; } 
        #chat-box { max-height: 150px; overflow-y: auto; background: rgba(0, 0, 0, 0.4); color: #fff; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; pointer-events: auto; text-shadow: 1px 1px 2px #000; }
        #chat-input-area { display: flex; height: 40px; pointer-events: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border-radius: 4px;}
        #chat-input { flex-grow: 1; padding: 8px; border: 2px solid var(--mucha-gold); border-radius: 4px 0 0 4px; background: rgba(244, 236, 216, 0.9); font-family: inherit;}
        #send-btn { padding: 8px 15px; background: var(--mucha-gold); color: white; border: 2px solid var(--mucha-gold); border-radius: 0 4px 4px 0; font-family: inherit; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <div id="action-menu" class="action-menu">
        <button id="view-profile-btn">洋蔥身分證</button>
    </div>

    <div id="furniture-menu" class="action-menu">
        <button id="move-furniture-btn">更改位置</button>
        <button onclick="alert('外觀系統開發中！敬請期待')">更改外觀</button>
    </div>

    <div id="login-screen">
        <h2 style="color: var(--mucha-green); border-bottom: 2px solid var(--mucha-gold); padding-bottom: 10px;">入館登記</h2>
        <input type="email" id="user-email" placeholder="信箱 (Email)"><br>
        <input type="password" id="user-pwd" placeholder="密碼"><br>
        <button id="join-btn">推開洋蔥世界之門</button>
    </div>

    <div id="view-profile-modal" class="modal">
        <h3 id="vp-title">洋蔥身分證</h3>
        <p style="text-align: left;">🎂 生日: <strong id="vp-birth"></strong></p>
        <p style="text-align: left;">🍛 最愛: <strong id="vp-food"></strong></p>
        <p style="text-align: left;">📜 座右銘:<br><i style="color:var(--mucha-green); font-size: 14px;">"<span id="vp-motto"></span>"</i></p>
        <button class="close-modal-btn btn-primary" onclick="document.getElementById('view-profile-modal').style.display='none'">收起證件</button>
    </div>

    <div id="fridge-modal" class="modal">
        <h3>❄️ 公用大冰箱</h3>
        <p style="color:#888; font-size: 14px;">(冰箱目前空空如也... 等待下次採買中)</p>
        <button class="close-modal-btn btn-primary" onclick="document.getElementById('fridge-modal').style.display='none'">關上冰箱</button>
    </div>

    <div id="memory-modal" class="modal">
        <h3>📖 咖啡廳回憶錄</h3>
        <div id="memory-feed"></div>
        <div id="memory-upload-area">
            <input type="file" id="memory-file" accept="image/*">
            <input type="text" id="memory-text" placeholder="寫下這張照片的回憶筆記...">
            <button class="btn-primary" id="upload-memory-btn">留存回憶</button>
        </div>
        <button class="close-modal-btn btn-secondary" style="margin-top: 15px;" onclick="document.getElementById('memory-modal').style.display='none'">闔上回憶錄</button>
    </div>

    <div id="game-layout-container">
        <div id="phaser-app"></div>
        
        <div id="furniture-panel">
            <button id="spawn-fridge-btn">🧊 擺放冰箱</button>
            <button id="spawn-memory-btn">📖 擺放回憶錄</button>
        </div>

        <div id="chat-section">
            <div id="chat-box"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="說點什麼...">
                <button id="send-btn">發送</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js?v=0.0.7"></script>
    <script>
        // 點擊畫面其他地方關閉浮動選單 (不影響 Phaser 點擊)
        window.addEventListener('pointerdown', (e) => {
            if (!e.target.closest('#action-menu') && !e.target.closest('#furniture-menu') && e.target.tagName !== 'CANVAS') {
                document.getElementById('action-menu').style.display = 'none';
                document.getElementById('furniture-menu').style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (confirm('發現新的更新！是否立即重新載入？')) window.location.reload();
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
