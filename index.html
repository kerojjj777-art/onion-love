<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>洋蔥人交誼廳</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        :root {
            --mucha-gold: #c5a059; --mucha-green: #4a5d4e;
            --mucha-brown: #3e2723; --mucha-paper: #f4ecd8;
        }
        body { 
            margin: 0; padding: 0; font-family: 'Georgia', 'Times New Roman', serif; 
            background-color: #1a1008; color: var(--mucha-brown); overflow: hidden; 
            touch-action: none; width: 100vw; height: 100vh; writing-mode: horizontal-tb;
        }
        /* UI 樣式統一由 JS 動態載入或在此設定基礎 */
        #app-container { width: 100%; height: 100%; }
        #game-layout-container { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        #phaser-app { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="app-container"></div>
    <script type="module" src="app.js?v=0.2.4.3"></script>
</body>
</html>
