<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洋蔥人交誼廳</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
        #login-screen { position: absolute; top: 20%; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10; }
        #game-container { display: none; flex-direction: column; width: 100%; max-width: 600px; }
        canvas { background: #e8f5e9; border: 2px solid #4caf50; border-radius: 8px; margin-top: 10px; }
        
        /* 虛擬搖桿與操作區 */
        .controls { display: grid; grid-template-columns: 50px 50px 50px; gap: 5px; justify-content: center; margin: 15px 0; }
        .controls button { width: 50px; height: 50px; font-size: 20px; background: #ddd; border: none; border-radius: 8px; touch-action: manipulation; }
        .controls button:active { background: #bbb; }
        .up { grid-column: 2; } .left { grid-column: 1; } .right { grid-column: 3; } .down { grid-column: 2; }
        
        /* 聊天室 */
        #chat-box { height: 150px; overflow-y: auto; background: white; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 5px; }
        #chat-input-area { display: flex; }
        #chat-input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #send-btn { padding: 8px 15px; background: #4caf50; color: white; border: none; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>創立你的洋蔥人</h2>
        <input type="text" id="username" placeholder="輸入名稱 (如: 朋友A)" maxlength="10"><br><br>
        <label>選擇顏色:</label>
        <input type="color" id="usercolor" value="#ffcc00"><br><br>
        <button id="join-btn">進入交誼廳</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div class="controls">
            <button class="up" id="btn-up">⬆️</button>
            <button class="left" id="btn-left">⬅️</button>
            <button class="right" id="btn-right">➡️</button>
            <button class="down" id="btn-down">⬇️</button>
        </div>

        <div id="chat-box"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="說點什麼...">
            <button id="send-btn">發送</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        // 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
