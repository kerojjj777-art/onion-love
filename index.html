<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洋蔥人交誼廳</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    
    <style>
        :root {
            --mucha-gold: #c5a059;
            --mucha-green: #4a5d4e;
            --mucha-brown: #3e2723;
            --mucha-paper: #f4ecd8;
        }

        body { 
            margin: 0; font-family: 'Georgia', 'Times New Roman', serif; 
            background-color: #2b201a; background-image: radial-gradient(circle, #3e2a1e 0%, #1a1008 100%);
            display: flex; flex-direction: column; align-items: center; 
            color: var(--mucha-brown); overflow: hidden; touch-action: none; /* 防止畫面跟著搖桿滑動 */
        }

        /* 頂部導覽列 */
        #top-bar {
            width: 100%; height: 50px; background: linear-gradient(to bottom, #111, #2b201a);
            border-bottom: 2px solid var(--mucha-gold); display: flex;
            justify-content: space-between; align-items: center; padding: 0 15px;
            box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 100;
        }

        #game-title { color: var(--mucha-gold); font-size: 20px; letter-spacing: 2px; }
        #menu-btn { background: none; border: 1px solid var(--mucha-gold); color: var(--mucha-gold); font-size: 24px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        
        /* 展開選單 (加入版本號) */
        #dropdown-menu {
            position: absolute; top: 55px; right: 10px; background: var(--mucha-paper);
            border: 2px solid var(--mucha-gold); border-radius: 8px;
            display: none; flex-direction: column; width: 150px; z-index: 100; overflow: hidden;
        }
        #dropdown-menu button { background: none; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding: 12px; font-size: 16px; color: var(--mucha-brown); text-align: left; }
        #app-version { padding: 8px; font-size: 12px; color: #888; text-align: center; background: #eaddc0; }

        /* 登入介面 */
        #login-screen { position: absolute; top: 25%; background: var(--mucha-paper); padding: 30px; border: 3px solid var(--mucha-gold); border-radius: 12px; z-index: 10; text-align: center; }
        #login-screen input { padding: 8px; border: 1px solid var(--mucha-gold); border-radius: 4px; background: #fffdf5; }
        #join-btn { background: var(--mucha-gold); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 15px;}

        /* 遊戲畫布 */
        #game-container { display: none; flex-direction: column; width: 100%; max-width: 600px; padding: 10px; box-sizing: border-box; }
        canvas { background-color: #8d6e63; background-image: url('cafe-bg.jpg'); background-size: cover; border: 4px solid var(--mucha-gold); border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        
        /* 虛擬搖桿 (觸控升級版) */
        #joystick-zone { width: 120px; height: 120px; background: rgba(197, 160, 89, 0.15); border: 2px solid var(--mucha-gold); border-radius: 50%; position: relative; margin: 15px auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #joystick-knob { width: 50px; height: 50px; background: radial-gradient(circle, var(--mucha-gold), #8c6e35); border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 4px 8px rgba(0,0,0,0.6); pointer-events: none; transition: transform 0.05s linear; }

        /* 聊天室 (縮小歷史紀錄) */
        #chat-box { height: 60px; overflow-y: auto; background: rgba(0, 0, 0, 0.5); color: #ccc; padding: 5px 10px; border: 1px solid var(--mucha-gold); border-radius: 8px; margin-bottom: 5px; font-size: 0.85em; }
        #chat-input-area { display: flex; }
        #chat-input { flex-grow: 1; padding: 8px; border: 2px solid var(--mucha-gold); border-radius: 4px 0 0 4px; background: var(--mucha-paper); }
        #send-btn { padding: 8px 15px; background: var(--mucha-gold); color: white; border: 2px solid var(--mucha-gold); border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="game-title">洋蔥人交誼廳</div>
        <button id="menu-btn">☰</button>
    </div>

    <div id="dropdown-menu">
        <button onclick="alert('進入洋蔥大廳 (開發中)')">☕ 洋蔥大廳</button>
        <button onclick="alert('進入我的狗窩 (開發中)')">🏠 我的狗窩</button>
        <button onclick="alert('進入我的蔥田 (開發中)')">🌱 我的蔥田</button>
        <div id="app-version">版本: v.0.0.1</div>
    </div>

    <div id="login-screen">
        <h2 style="color: var(--mucha-green); border-bottom: 1px solid var(--mucha-gold); padding-bottom: 10px;">入館登記</h2>
        <input type="text" id="username" placeholder="輸入您的稱呼" maxlength="10"><br><br>
        <label>光環顏色:</label>
        <input type="color" id="usercolor" value="#c5a059"><br><br>
        <button id="join-btn">推開咖啡廳大門</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="350"></canvas>
        
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="chat-box"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="在咖啡廳裡說點什麼...">
            <button id="send-btn">發送</button>
        </div>
    </div>

    <script type="module" src="app.js?v=0.0.1"></script>
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const dropdownMenu = document.getElementById('dropdown-menu');
        menuBtn.addEventListener('click', () => {
            dropdownMenu.style.display = dropdownMenu.style.display === 'flex' ? 'none' : 'flex';
        });

        // PWA 自動更新偵測機制
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        // 當有新版本的 Service Worker 安裝完畢時
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (confirm('發現咖啡廳有新的更新！是否立即重新載入？')) {
                                window.location.reload();
                            }
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
