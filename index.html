<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>洋蔥人交誼廳</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        :root {
            --mucha-gold: #c5a059; --mucha-green: #4a5d4e;
            --mucha-brown: #3e2723; --mucha-paper: #f4ecd8;
        }

        /* 滿版設定，禁止滾動 */
        body { 
            margin: 0; padding: 0; font-family: 'Georgia', 'Times New Roman', serif; 
            background-color: #2b201a; color: var(--mucha-brown); 
            overflow: hidden; touch-action: none; width: 100vw; height: 100vh;
        }

        /* Z-Index: 0 (底層 Phaser 遊戲畫面) */
        #phaser-app {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
        }

        /* Z-Index: 100 (頂層導覽列) */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px; 
            background: linear-gradient(to bottom, rgba(17,17,17,0.9), rgba(43,32,26,0.9));
            border-bottom: 2px solid var(--mucha-gold); display: none; 
            justify-content: space-between; align-items: center; padding: 0 15px;
            box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 100;
        }

        #game-title { color: var(--mucha-gold); font-size: 20px; letter-spacing: 2px; text-shadow: 1px 1px 2px #000; }
        #menu-btn { background: none; border: 1px solid var(--mucha-gold); color: var(--mucha-gold); font-size: 24px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        
        #dropdown-menu {
            position: absolute; top: 55px; right: 10px; background: var(--mucha-paper);
            border: 2px solid var(--mucha-gold); border-radius: 8px;
            display: none; flex-direction: column; width: 150px; z-index: 100; overflow: hidden;
        }
        #dropdown-menu button { background: none; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding: 12px; font-size: 16px; color: var(--mucha-brown); text-align: left; cursor: pointer; }
        #app-version { padding: 8px; font-size: 12px; color: #888; text-align: center; background: #eaddc0; }

        /* Z-Index: 50 (浮動遊戲 UI) */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 50; display: none;
        }

        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px; width: 90px; height: 90px; 
            background: rgba(197, 160, 89, 0.15); border: 2px solid var(--mucha-gold); 
            border-radius: 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
            pointer-events: auto; touch-action: none;
        }
        #joystick-knob {
            width: 36px; height: 36px; background: radial-gradient(circle, var(--mucha-gold), #8c6e35); 
            border-radius: 50%; position: absolute; top: 27px; left: 27px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.6); pointer-events: none; transition: transform 0.05s linear;
        }
        
        #action-buttons {
            position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; pointer-events: auto;
        }
        .action-btn { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle, var(--mucha-paper), #d4c5a0); border: 3px solid var(--mucha-gold); color: var(--mucha-brown); font-size: 20px; font-weight: bold; box-shadow: 0 6px 0 #8c6e35; cursor: pointer; user-select: none; }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #8c6e35; background: var(--mucha-gold); color: white;}

        #chat-section {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px; display: flex; flex-direction: column; pointer-events: auto;
        }
        #chat-box { height: 80px; overflow-y: auto; background: rgba(0, 0, 0, 0.6); color: #ccc; padding: 5px 10px; border: 1px solid var(--mucha-gold); border-radius: 8px; margin-bottom: 5px; font-size: 0.85em; text-shadow: 1px 1px 1px #000; }
        #chat-input-area { display: flex; }
        #chat-input { flex-grow: 1; padding: 8px; border: 2px solid var(--mucha-gold); border-radius: 4px 0 0 4px; background: rgba(244, 236, 216, 0.9); font-family: inherit;}
        #send-btn { padding: 8px 15px; background: var(--mucha-gold); color: white; border: 2px solid var(--mucha-gold); border-radius: 0 4px 4px 0; font-family: inherit;}

        #furniture-panel {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; justify-content: center; gap: 10px; padding: 8px; 
            background: rgba(43, 32, 26, 0.8); border-radius: 8px; border: 1px solid var(--mucha-gold); 
            pointer-events: auto;
        }
        #furniture-panel button { background: var(--mucha-paper); border: 2px solid var(--mucha-gold); padding: 5px 15px; border-radius: 6px; color: var(--mucha-brown); font-weight: bold; font-size: 14px; cursor: pointer; }

        /* Z-Index: 200 (彈出視窗與選單) */
        .action-menu {
            display: none; position: absolute; background: var(--mucha-paper); border: 2px solid var(--mucha-gold); 
            border-radius: 8px; z-index: 200; padding: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); flex-direction: column;
        }
        .action-menu button { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--mucha-brown); padding: 8px 12px; text-align: center; writing-mode: horizontal-tb; }
        .action-menu button:not(:last-child) { border-bottom: 1px solid rgba(197, 160, 89, 0.3); }

        #login-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--mucha-paper); padding: 30px; border: 3px solid var(--mucha-gold); border-radius: 12px; z-index: 250; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        #login-screen input { padding: 8px; border: 1px solid var(--mucha-gold); border-radius: 4px; background: #fffdf5; margin-bottom: 10px; width: 90%;}
        #join-btn { background: var(--mucha-gold); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 16px;}

        .modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--mucha-paper); padding: 20px; border: 3px solid var(--mucha-gold); 
            border-radius: 12px; z-index: 200; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.8); 
            width: 80%; max-width: 320px; max-height: 75vh; overflow-y: auto;
        }
        .modal h3 { color: var(--mucha-green); margin-top: 0; border-bottom: 1px solid var(--mucha-gold); padding-bottom: 5px; }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 15px; }
        .modal-btns button, .close-modal-btn { padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-family: inherit; }
        .btn-primary { background: var(--mucha-gold); color: white; }
        .btn-secondary { background: #ccc; color: #333; }
        
        #settings-modal input { padding: 6px; border: 1px solid var(--mucha-gold); border-radius: 4px; background: #fffdf5; margin-bottom: 10px; width: 90%; }
        
        #memory-feed { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; text-align: left; }
        .memory-card { background: #fff; border: 1px solid var(--mucha-gold); border-radius: 8px; padding: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .memory-card img { width: 100%; border-radius: 4px; margin-bottom: 8px; }
        .memory-card .author { font-size: 12px; color: var(--mucha-gold); font-weight: bold; margin-bottom: 4px; }
        .memory-card .text { font-size: 14px; color: var(--mucha-brown); }
        #memory-upload-area { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; border-top: 2px dashed var(--mucha-gold); padding-top: 10px; }
        #memory-upload-area input[type="text"] { padding: 8px; border: 1px solid var(--mucha-gold); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="phaser-app"></div>

    <div id="top-bar">
        <div id="game-title">我的狗窩</div>
        <button id="menu-btn">☰</button>
    </div>

    <div id="dropdown-menu">
        <button id="nav-doghouse">🏠 我的狗窩</button>
        <button id="nav-cafe">☕ 洋蔥大廳</button>
        <button id="nav-settings">⚙️ 角色設定</button>
        <button id="nav-logout">🚪 登出</button>
        <div id="app-version">版本: v.0.1.0</div>
    </div>

    <div id="action-menu" class="action-menu">
        <button id="view-profile-btn">查看這顆蔥</button>
    </div>

    <div id="furniture-menu" class="action-menu">
        <button id="move-furniture-btn">解鎖並移動</button>
        <button onclick="alert('外觀系統開發中！敬請期待')">更改外觀</button>
    </div>

    <div id="login-screen">
        <h2 style="color: var(--mucha-green); border-bottom: 1px solid var(--mucha-gold); padding-bottom: 10px;">入館登記</h2>
        <input type="email" id="user-email" placeholder="信箱 Email"><br>
        <input type="password" id="user-pwd" placeholder="密碼"><br>
        <button id="join-btn">推開洋蔥世界之門</button>
    </div>

    <div id="ui-layer">
        <div id="furniture-panel">
            <button id="spawn-fridge-btn">🧊 放冰箱</button>
            <button id="spawn-memory-btn">📖 放回憶錄</button>
        </div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        
        <div id="action-buttons">
            <button class="action-btn" id="btn-b">B</button>
            <button class="action-btn" id="btn-a">A</button>
        </div>

        <div id="chat-section">
            <div id="chat-box"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="在咖啡廳裡說點什麼...">
                <button id="send-btn">發送</button>
            </div>
        </div>
    </div>

    <div id="view-profile-modal" class="modal">
        <h3 id="vp-title">名牌</h3>
        <p style="text-align: left;">🎂 生日: <strong id="vp-birth"></strong></p>
        <p style="text-align: left;">🍛 最愛: <strong id="vp-food"></strong></p>
        <p style="text-align: left;">📜 座右銘:<br><i style="color:var(--mucha-green); font-size: 14px;">"<span id="vp-motto"></span>"</i></p>
        <button class="close-modal-btn btn-primary" onclick="document.getElementById('view-profile-modal').style.display='none'">關閉收合</button>
    </div>

    <div id="settings-modal" class="modal">
        <h3>角色設定</h3>
        <label>稱呼：</label><br><input type="text" id="set-name" maxlength="10"><br>
        <label>光環顏色：</label><br><input type="color" id="set-color"><br><br>
        <label>生日：</label><br><input type="text" id="set-birth" placeholder="例如: 1月1日"><br>
        <label>愛吃的食物：</label><br><input type="text" id="set-food" placeholder="例如: 咖哩飯"><br>
        <label>座右銘：</label><br><input type="text" id="set-motto" placeholder="一句話代表你"><br>
        <div class="modal-btns">
            <button class="btn-secondary" onclick="document.getElementById('settings-modal').style.display='none'">取消</button>
            <button class="btn-primary" id="save-settings-btn">儲存記錄</button>
        </div>
    </div>

    <div id="fridge-modal" class="modal">
        <h3>❄️ 公用大冰箱</h3>
        <p style="color:#888; font-size: 14px;">冰箱目前空空如也... 等待下次採買中</p>
        <button class="close-modal-btn btn-primary" onclick="document.getElementById('fridge-modal').style.display='none'">關上冰箱</button>
    </div>

    <div id="memory-modal" class="modal">
        <h3>📖 咖啡廳回憶錄</h3>
        <div id="memory-feed"></div>
        <div id="memory-upload-area">
            <input type="file" id="memory-file" accept="image/*">
            <input type="text" id="memory-text" placeholder="寫下這張照片的回憶筆記...">
            <button class="btn-primary" id="upload-memory-btn">留存回憶</button>
        </div>
        <button class="close-modal-btn btn-secondary" style="margin-top: 15px;" onclick="document.getElementById('memory-modal').style.display='none'">闔上回憶錄</button>
    </div>

    <script type="module" src="app.js?v=0.1.0"></script>
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const dropdownMenu = document.getElementById('dropdown-menu');
        menuBtn.addEventListener('click', () => {
            dropdownMenu.style.display = dropdownMenu.style.display === 'flex' ? 'none' : 'flex';
        });

        // 點擊空白處關閉浮動選單
        window.addEventListener('pointerdown', (e) => {
            if (!e.target.closest('.action-menu') && e.target.id !== 'gameCanvas') {
                document.getElementById('action-menu').style.display = 'none';
                document.getElementById('furniture-menu').style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (confirm('發現新的更新！是否立即重新載入？')) window.location.reload();
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
